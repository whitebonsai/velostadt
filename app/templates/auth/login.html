{% extends "base.html" %}
{% block title %}Anmelden – Velostadt{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">Anmelden</h4>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Ich bin ein …</label>
            <div class="d-flex gap-3">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="role" id="roleBenutzer" value="benutzer" checked>
                <label class="form-check-label" for="roleBenutzer">Nutzer</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="role" id="roleAnbieter" value="anbieter">
                <label class="form-check-label" for="roleAnbieter">Anbieter</label>
              </div>
            </div>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">E-Mail</label>
            <input type="email" id="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Passwort</label>
            <input type="password" id="password" name="password" class="form-control" required>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember" name="remember">
            <label class="form-check-label" for="remember">Angemeldet bleiben</label>
          </div>
          <button type="submit" class="btn btn-primary w-100">Anmelden</button>
        </form>
      </div>
    </div>
    <p class="text-center mt-3 text-muted">
      Noch kein Konto?
      <a href="{{ url_for('auth.register_benutzer') }}">Als Nutzer registrieren</a> oder
      <a href="{{ url_for('auth.register_anbieter') }}">als Anbieter registrieren</a>.
    </p>
  </div>
</div>
{% endblock %}
