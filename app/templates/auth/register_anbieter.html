{% extends "base.html" %}
{% block title %}Als Anbieter registrieren – Velostadt{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h4 class="card-title mb-4">Als Anbieter registrieren</h4>
        <p class="text-muted small mb-3">
          Als Anbieter können Sie Ihre Fahrzeugflotte verwalten und Fahrzeuge zum Verleih anbieten.
        </p>
        <form method="post">
          <div class="mb-3">
            <label for="name" class="form-label">Firmen- oder Anbieter-Name</label>
            <input type="text" id="name" name="name" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">E-Mail</label>
            <input type="email" id="email" name="email" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Passwort</label>
            <input type="password" id="password" name="password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label for="password2" class="form-label">Passwort wiederholen</label>
            <input type="password" id="password2" name="password2" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Registrieren</button>
        </form>
      </div>
    </div>
    <p class="text-center mt-3 text-muted">
      Bereits registriert? <a href="{{ url_for('auth.login') }}">Anmelden</a>
    </p>
  </div>
</div>
{% endblock %}
